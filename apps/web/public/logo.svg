<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <!-- Icon: stylized brain + code bracket -->
  <rect x="8" y="12" width="72" height="72" rx="16" fill="url(#grad)" />
  <text x="44" y="62" font-family="'Courier New', monospace" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">&lt;/&gt;</text>
  <circle cx="56" cy="20" r="6" fill="#FFD700" opacity="0.9" />

  <!-- Text -->
  <text x="100" y="46" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#E8E8E8" letter-spacing="0.5">SideProject</text>
  <text x="100" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#E8E8E8" letter-spacing="0.5">AIdvisor</text>

  <!-- Gradient bar under text -->
  <rect x="100" y="76" width="180" height="3" rx="1.5" fill="url(#grad)" />

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
  </defs>
</svg>
